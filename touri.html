<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محاسبه‌گر توری</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Vazirmatn', Tahoma, sans-serif; direction: rtl; background: #f4f4f4; color: #222; }
  header { background: #fff; border-bottom: 1px solid #ddd; padding: 14px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 17px; font-weight: 700; }
  .container { max-width: 600px; margin: 0 auto; padding: 16px; }
  .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  h2 { font-size: 15px; font-weight: 700; margin-bottom: 14px; color: #333; }
  label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; margin-top: 10px; }
  input, select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Vazirmatn', Tahoma, sans-serif; font-size: 15px; background: #fafafa; }
  input:focus, select:focus { outline: none; border-color: #1a73e8; background: #fff; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn { width: 100%; padding: 13px; border: none; border-radius: 10px; font-family: 'Vazirmatn', Tahoma, sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 4px; }
  .btn-blue { background: #1a73e8; color: #fff; }
  .btn-green { background: #e6f4ea; color: #1e7e34; border: 1px solid #a8d5b0; }
  .btn-red { background: #fce8e6; color: #c62828; border: 1px solid #f5c6c2; }
  .btn-print { background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .result-box { background: #e8f0fe; border-radius: 10px; padding: 14px; margin-top: 12px; }
  .result-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; border-bottom: 1px solid #c5d3f5; }
  .result-row:last-child { border-bottom: none; font-weight: 700; font-size: 15px; padding-top: 10px; color: #1a73e8; }
  .result-label { color: #555; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: right; color: #888; padding: 6px 8px; border-bottom: 1px solid #eee; font-weight: 500; }
  td { padding: 9px 8px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  .del-btn { background: none; border: none; color: #e53935; font-size: 18px; cursor: pointer; padding: 0 4px; }
  .total-bar { display: flex; justify-content: space-between; padding: 12px 0 0; margin-top: 8px; border-top: 2px solid #eee; font-size: 16px; font-weight: 700; color: #1a73e8; }
  #factor-section { display: none; }
  .tag { display: inline-block; background: #e8f5e9; color: #2e7d32; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }

  /* صفحه فاکتور PDF */
  #pdf-view { display: none; position: fixed; top: 0; right: 0; left: 0; bottom: 0; background: #fff; z-index: 100; overflow-y: auto; padding: 28px; font-family: 'Vazirmatn', Tahoma, sans-serif; }
  #pdf-view h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  #pdf-view .meta { font-size: 13px; color: #666; margin-bottom: 20px; }
  #pdf-view table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 20px; }
  #pdf-view th { background: #f0f0f0; padding: 9px 10px; text-align: right; font-weight: 600; border: 1px solid #ddd; }
  #pdf-view td { padding: 9px 10px; border: 1px solid #ddd; vertical-align: top; }
  #pdf-view tr:nth-child(even) td { background: #fafafa; }
  #pdf-view .total-pdf { background: #f5f5f5; border: 1.5px solid #ccc; border-radius: 8px; padding: 14px 18px; display: flex; justify-content: space-between; font-size: 16px; font-weight: 700; margin-bottom: 20px; }
  #pdf-view .footer-pdf { text-align: center; font-size: 11px; color: #bbb; border-top: 1px solid #eee; padding-top: 10px; margin-bottom: 20px; }
  .pdf-btns { display: flex; gap: 10px; margin-bottom: 20px; }
  .pdf-btns button { flex: 1; padding: 12px; border-radius: 10px; font-family: 'Vazirmatn', Tahoma, sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; border: none; }
  .btn-back { background: #f1f3f4; color: #333; }
  .btn-do-print { background: #1a73e8; color: #fff; }

  @media print {
    body > * { display: none !important; }
    #pdf-view { display: block !important; position: static !important; padding: 0 !important; }
    .pdf-btns { display: none !important; }
  }
</style>
</head>
<body>

<header>
  <span style="font-size:22px">🪟</span>
  <h1>محاسبه‌گر توری</h1>
</header>

<div class="container">
  <div class="card">
    <h2>اطلاعات توری</h2>
    <div class="row2">
      <div>
        <label>طول (میلی‌متر)</label>
        <input type="number" id="length" placeholder="مثال: 1200" min="0" inputmode="numeric">
      </div>
      <div>
        <label>عرض (میلی‌متر)</label>
        <input type="number" id="width" placeholder="مثال: 800" min="0" inputmode="numeric">
      </div>
    </div>
    <label>نوع توری</label>
    <select id="type">
      <option value="توری مشکی">توری مشکی</option>
      <option value="توری سفید">توری سفید</option>
      <option value="پلیسه سفید">پلیسه سفید</option>
      <option value="پلیسه مشکی">پلیسه مشکی</option>
    </select>
    <label>قیمت واحد (تومان / متر مربع)</label>
    <input type="number" id="unitPrice" placeholder="مثال: 150000" min="0" inputmode="numeric">

    <div id="calc-result" style="display:none">
      <div class="result-box">
        <div class="result-row"><span class="result-label">ابعاد ورودی</span><span id="r-input"></span></div>
        <div class="result-row"><span class="result-label">ابعاد نهایی (cm)</span><span id="r-cm"></span></div>
        <div class="result-row"><span class="result-label">ابعاد نهایی (متر)</span><span id="r-m"></span></div>
        <div class="result-row"><span class="result-label">مساحت</span><span id="r-area"></span></div>
        <div class="result-row"><span class="result-label">قیمت کل</span><span id="r-price"></span></div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-blue" onclick="calculate()">📐 محاسبه</button>
      <button class="btn btn-green" onclick="addToFactor()">➕ افزودن به فاکتور</button>
    </div>
  </div>

  <div class="card" id="factor-section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h2 style="margin:0">فاکتور</h2>
      <span class="tag" id="item-count">۰ آیتم</span>
    </div>
    <div id="items-container"></div>
    <div class="total-bar">
      <span>جمع کل</span>
      <span id="grand-total">۰ تومان</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-print" onclick="showPDF()">🖨️ چاپ / PDF</button>
      <button class="btn btn-red" onclick="clearFactor()">🗑️ پاک کردن</button>
    </div>
  </div>
</div>

<!-- صفحه پرینت -->
<div id="pdf-view">
  <div class="pdf-btns">
    <button class="btn-back" onclick="hidePDF()">← برگشت</button>
    <button class="btn-do-print" onclick="window.print()">🖨️ چاپ / ذخیره PDF</button>
  </div>
  <h1>فاکتور توری</h1>
  <div class="meta" id="pdf-date"></div>
  <div id="pdf-content"></div>
  <div class="footer-pdf">محاسبه‌گر توری</div>
</div>

<script>
  let items = [];
  let lastCalc = null;

  function p(n) { return String(n).replace(/\d/g, d => '۰۱۲۳۴۵۶۷۸۹'[d]); }
  function fmt(n) { return p(Math.round(n).toLocaleString('fa-IR')); }

  function calculate() {
    const L = parseFloat(document.getElementById('length').value);
    const W = parseFloat(document.getElementById('width').value);
    const price = parseFloat(document.getElementById('unitPrice').value);
    const type = document.getElementById('type').value;
    if (!L || !W || !price) { alert('طول، عرض و قیمت را وارد کنید.'); return; }
    const fL = L + 60, fW = W + 60;
    const fLcm = fL / 10, fWcm = fW / 10;
    const fLm = fL / 1000, fWm = fW / 1000;
    const area = fLm * fWm;
    const total = area * price;
    lastCalc = { L, W, fL, fW, fLcm, fWcm, fLm, fWm, area, total, price, type };
    document.getElementById('r-input').textContent = p(L) + ' × ' + p(W) + ' mm';
    document.getElementById('r-cm').textContent = p(fLcm.toFixed(1)) + ' × ' + p(fWcm.toFixed(1)) + ' cm';
    document.getElementById('r-m').textContent = p(fLm.toFixed(3)) + ' × ' + p(fWm.toFixed(3)) + ' m';
    document.getElementById('r-area').textContent = p(area.toFixed(4)) + ' متر مربع';
    document.getElementById('r-price').textContent = fmt(total) + ' تومان';
    document.getElementById('calc-result').style.display = 'block';
  }

  function addToFactor() {
    if (!lastCalc) { alert('ابتدا محاسبه کنید.'); return; }
    items.push({ ...lastCalc, id: Date.now() });
    renderFactor();
    document.getElementById('calc-result').style.display = 'none';
    document.getElementById('length').value = '';
    document.getElementById('width').value = '';
    lastCalc = null;
  }

  function removeItem(id) {
    items = items.filter(i => i.id !== id);
    renderFactor();
  }

  function renderFactor() {
    const sec = document.getElementById('factor-section');
    sec.style.display = items.length ? 'block' : 'none';
    document.getElementById('item-count').textContent = p(items.length) + ' آیتم';
    let grand = 0, rows = '';
    items.forEach((item, i) => {
      grand += item.total;
      rows += `<tr>
        <td>${p(i+1)}</td>
        <td>${item.type}</td>
        <td>${p(item.L)}×${p(item.W)}<br><small style="color:#999">${p(item.fLcm.toFixed(1))}×${p(item.fWcm.toFixed(1))} cm</small></td>
        <td>${p(item.area.toFixed(3))}</td>
        <td>${fmt(item.total)}</td>
        <td><button class="del-btn" onclick="removeItem(${item.id})">✕</button></td>
      </tr>`;
    });
    document.getElementById('items-container').innerHTML = `
      <table>
        <thead><tr><th>#</th><th>نوع</th><th>ابعاد(mm)</th><th>m²</th><th>قیمت(تومان)</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    document.getElementById('grand-total').textContent = fmt(grand) + ' تومان';
  }

  function clearFactor() {
    if (confirm('فاکتور پاک شود؟')) { items = []; renderFactor(); }
  }

  function showPDF() {
    if (!items.length) { alert('فاکتور خالی است.'); return; }
    let grand = 0, rows = '';
    items.forEach((item, i) => {
      grand += item.total;
      rows += `<tr>
        <td>${i+1}</td><td>${item.type}</td>
        <td>${item.L} × ${item.W} mm<br><small>${item.fLcm.toFixed(1)} × ${item.fWcm.toFixed(1)} cm</small></td>
        <td>${item.area.toFixed(4)}</td>
        <td>${Math.round(item.total).toLocaleString()} تومان</td>
      </tr>`;
    });
    document.getElementById('pdf-date').textContent = 'تاریخ: ' + new Date().toLocaleDateString('fa-IR');
    document.getElementById('pdf-content').innerHTML = `
      <table>
        <thead><tr><th>#</th><th>نوع توری</th><th>ابعاد</th><th>مساحت (m²)</th><th>قیمت</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="total-pdf"><span>جمع کل فاکتور</span><span>${Math.round(grand).toLocaleString()} تومان</span></div>`;
    document.getElementById('pdf-view').style.display = 'block';
    window.scrollTo(0, 0);
  }

  function hidePDF() {
    document.getElementById('pdf-view').style.display = 'none';
  }
</script>
</body>
</html>
